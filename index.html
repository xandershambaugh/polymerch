<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket — Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden; /* no scroll on password page */
    }

    /* Animated static canvas — fills entire viewport behind everything */
    #staticCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Ticker sits above canvas */
    .site-ticker {
      position: relative;
      z-index: 10;
    }

    /* Password form centered over static */
    .password-gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none; /* let canvas show through around the form */
    }

    .password-form-wrap {
      pointer-events: all;
      text-align: center;
      padding: 44px 48px 40px;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .password-form-wrap h1 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 22px;
    }

    .password-input-row {
      display: flex;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: transparent;
    }

    .password-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 11px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #fff;
      min-width: 220px;
    }

    .password-input-row input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.22em;
    }

    .password-submit-btn {
      background: transparent;
      border: none;
      border-left: 1px solid rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.7);
      padding: 0 18px;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .password-submit-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .password-error {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ff4444;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <!-- TV STATIC CANVAS -->
  <canvas id="staticCanvas"></canvas>

  <!-- POLYMARKET TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <!-- PASSWORD GATE -->
  <main class="password-gate">
    <div class="password-form-wrap">
      <h1>Enter Password</h1>
      <form id="passwordForm">
        <div class="password-input-row">
          <input
            type="password"
            id="passwordInput"
            placeholder="PASSWORD"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="password-submit-btn">→</button>
        </div>
      </form>
      <p class="password-error" id="passwordError" style="display:none;">Incorrect password. Try again.</p>
    </div>
  </main>

  <script>
    // ── TV Static ────────────────────────────────────────────────────────
    const canvas = document.getElementById('staticCanvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Draw one frame of pixel noise, then schedule the next
    function drawStatic() {
      const w    = canvas.width;
      const h    = canvas.height;
      const img  = ctx.createImageData(w, h);
      const data = img.data;

      // Fill every pixel with a random grey value
      for (let i = 0; i < data.length; i += 4) {
        const v    = (Math.random() * 255) | 0;
        data[i]   = v;   // R
        data[i+1] = v;   // G
        data[i+2] = v;   // B
        data[i+3] = 255; // A
      }
      ctx.putImageData(img, 0, 0);
      requestAnimationFrame(drawStatic);
    }
    drawStatic();

    // ── Password gate ────────────────────────────────────────────────────
    const CORRECT_PASSWORD = 'chaostheory';

    const form    = document.getElementById('passwordForm');
    const input   = document.getElementById('passwordInput');
    const errorEl = document.getElementById('passwordError');

    if (sessionStorage.getItem('pm_auth') === 'true') {
      window.location.replace('shop.html');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value === CORRECT_PASSWORD) {
        sessionStorage.setItem('pm_auth', 'true');
        window.location.replace('shop.html');
      } else {
        errorEl.style.display = 'block';
        input.value = '';
        input.focus();
        input.closest('.password-input-row').style.borderColor = '#ff4444';
        setTimeout(() => {
          input.closest('.password-input-row').style.borderColor = 'rgba(255,255,255,0.35)';
        }, 1200);
      }
    });

    input.addEventListener('input', () => { errorEl.style.display = 'none'; });
  </script>
  <script src="js/ticker.js"></script>
</body>
</html>
