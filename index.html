<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket — Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* TV static canvas fills entire viewport */
    #staticCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Password form centered over static */
    .password-gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Trajan stone backdrop ─────────────────────────────────────── */
    .password-form-wrap {
      pointer-events: all;
      text-align: center;
      width: 480px;
      padding: 44px 48px 40px;
      background-image:
        linear-gradient(rgba(8, 6, 3, 0.50), rgba(8, 6, 3, 0.56)),
        url('assets/images/trajan.jpg');
      background-size: cover;
      background-position: center 30%;
      border: 1px solid rgba(180, 148, 72, 0.30);
      overflow: hidden;
    }

    /* ── POLYMARKET title — carved stone effect ────────────────────── */
    .pw-brand {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.30em;
      text-indent: 0.30em; /* offset letter-spacing overhang */
      color: rgba(238, 218, 168, 0.96);
      text-shadow:
        -1px -1px 0   rgba(255, 255, 255, 0.07),
         1px  1px 3px rgba(0, 0, 0, 0.90),
         0    2px 8px rgba(0, 0, 0, 0.60);
      margin-bottom: 6px;
    }

    /* ── MMXXVI subtitle ───────────────────────────────────────────── */
    .pw-year {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.60em;
      text-indent: 0.60em;
      color: rgba(196, 166, 96, 0.72);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.85);
      margin-bottom: 32px;
    }

    /* ── "Enter Password" label ────────────────────────────────────── */
    .password-form-wrap h1 {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-indent: 0.38em;
      text-transform: uppercase;
      color: rgba(196, 166, 96, 0.62);
      margin-bottom: 16px;
    }

    .password-input-row {
      display: flex;
      border: 1px solid rgba(196, 166, 96, 0.38);
      background: transparent;
    }

    .password-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 11px 16px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(238, 218, 168, 0.90);
      min-width: 220px;
    }

    .password-input-row input::placeholder {
      color: rgba(196, 166, 96, 0.38);
      letter-spacing: 0.30em;
    }

    .password-submit-btn {
      background: transparent;
      border: none;
      border-left: 1px solid rgba(196, 166, 96, 0.38);
      color: rgba(196, 166, 96, 0.70);
      padding: 0 18px;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .password-submit-btn:hover {
      color: rgba(238, 218, 168, 1);
      background: rgba(196, 166, 96, 0.08);
    }

    .password-error {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #ff6644;
      margin-top: 14px;
    }

    /* ── Bottom ticker — fixed, Cinzel ─────────────────────────────── */
    .pw-bottom-ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      height: 30px;
      background: rgba(10, 8, 4, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(180, 148, 72, 0.22);
      overflow: hidden;
    }

    .pw-bottom-ticker .ticker-track {
      display: inline-block;
      white-space: nowrap;
      line-height: 30px;
      animation: ticker-scroll 90s linear infinite;
      font-family: 'Cinzel', serif !important;
      font-size: 9px;
      letter-spacing: 0.28em;
      color: rgba(206, 174, 100, 0.80);
    }

    .pw-bottom-ticker .ticker-track a {
      font-family: 'Cinzel', serif !important;
      color: rgba(206, 174, 100, 0.80);
      text-decoration: none;
      text-transform: uppercase;
    }

    .pw-bottom-ticker .ticker-track a:hover {
      color: rgba(238, 218, 168, 1);
    }

    .pw-bottom-ticker .ticker-sep {
      color: rgba(180, 148, 72, 0.45);
      margin: 0 14px;
    }
  </style>
</head>
<body>

  <!-- TV STATIC CANVAS -->
  <canvas id="staticCanvas"></canvas>

  <!-- PASSWORD GATE -->
  <main class="password-gate">
    <div class="password-form-wrap">
      <p class="pw-brand">POLYMARKET</p>
      <p class="pw-year">MMXXVI</p>
      <h1>Enter Password</h1>
      <form id="passwordForm">
        <div class="password-input-row">
          <input
            type="password"
            id="passwordInput"
            placeholder="PASSWORD"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="password-submit-btn">→</button>
        </div>
      </form>
      <p class="password-error" id="passwordError" style="display:none;">Incorrect password. Try again.</p>
    </div>
  </main>

  <!-- TICKER — fixed bottom, Cinzel -->
  <div class="pw-bottom-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <script>
    // ── TV Static + Glitches ─────────────────────────────────────────────
    const canvas = document.getElementById('staticCanvas');
    const ctx    = canvas.getContext('2d');

    const SCALE = 2;
    let W, H;

    function resizeCanvas() {
      W = canvas.width  = Math.ceil(window.innerWidth  / SCALE);
      H = canvas.height = Math.ceil(window.innerHeight / SCALE);
      canvas.style.width  = '100%';
      canvas.style.height = '100%';
      canvas.style.imageRendering = 'pixelated';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const glitches = [];

    function spawnGlitch() {
      const roll = Math.random();

      if (roll < 0.30) {
        glitches.push({
          kind: 'band',
          y:    (Math.random() * 0.85 * H) | 0,
          h:    (1 + Math.random() * 8)    | 0,
          v:    170 + (Math.random() * 85) | 0,
          life: 1, decay: 0.10 + Math.random() * 0.18
        });
      } else if (roll < 0.55) {
        glitches.push({
          kind: 'dropout',
          y:    (Math.random() * 0.85 * H) | 0,
          h:    (3 + Math.random() * 22)   | 0,
          life: 1, decay: 0.09 + Math.random() * 0.14
        });
      } else if (roll < 0.75) {
        const count = 1 + (Math.random() * 3 | 0);
        glitches.push({
          kind:  'tear',
          lines: Array.from({ length: count }, () => ({
            y:     (Math.random() * H)            | 0,
            h:     (1 + Math.random() * 6)        | 0,
            shift: (Math.random() > 0.5 ? 1 : -1) * ((10 + Math.random() * 35) | 0)
          })),
          life: 1, decay: 0.20 + Math.random() * 0.30
        });
      } else if (roll < 0.90) {
        glitches.push({
          kind: 'flicker',
          boost: 20 + (Math.random() * 30) | 0,
          life: 1, decay: 0.25 + Math.random() * 0.40
        });
      } else {
        glitches.push({
          kind:    'ghost',
          yShift:  ((Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 14)) | 0,
          opacity: 0.08 + Math.random() * 0.14,
          life: 1, decay: 0.06 + Math.random() * 0.10
        });
      }
    }

    function scheduleGlitch() {
      setTimeout(() => { spawnGlitch(); scheduleGlitch(); },
        2000 + Math.random() * 5000);
    }
    setTimeout(scheduleGlitch, 800);

    let lastTs  = 0;
    const FRAME = 1000 / 24;

    const ghost = document.createElement('canvas');
    const gCtx  = ghost.getContext('2d');

    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - lastTs < FRAME) return;
      lastTs = ts;

      const flickerG = glitches.find(g => g.kind === 'flicker');
      const boost    = flickerG ? flickerG.boost * flickerG.life : 0;

      const img  = ctx.createImageData(W, H);
      const data = img.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = Math.random();
        let v;
        if      (r < 0.62) v = Math.random() * 28;
        else if (r < 0.88) v = 28 + Math.random() * 55;
        else               v = 83 + Math.random() * 120;
        v = Math.min(255, v + boost) | 0;
        data[i] = data[i+1] = data[i+2] = v;
        data[i+3] = 255;
      }
      ctx.putImageData(img, 0, 0);

      glitches.filter(g => g.kind === 'tear').forEach(g => {
        g.lines.forEach(ln => {
          const strip = ctx.getImageData(0, ln.y, W, ln.h);
          ctx.putImageData(strip, ln.shift, ln.y);
          ctx.fillStyle = 'rgba(0,0,0,0.9)';
          if (ln.shift > 0) ctx.fillRect(0, ln.y, ln.shift, ln.h);
          else              ctx.fillRect(W + ln.shift, ln.y, -ln.shift, ln.h);
        });
      });

      glitches.filter(g => g.kind === 'band').forEach(g => {
        const v = g.v;
        ctx.fillStyle = `rgba(${v},${v},${v},${0.82 * g.life})`;
        ctx.fillRect(0, g.y, W, g.h);
      });

      glitches.filter(g => g.kind === 'dropout').forEach(g => {
        ctx.fillStyle = `rgba(0,0,0,${0.88 * g.life})`;
        ctx.fillRect(0, g.y, W, g.h);
      });

      glitches.filter(g => g.kind === 'ghost').forEach(g => {
        ghost.width  = W;
        ghost.height = H;
        gCtx.putImageData(img, 0, 0);
        ctx.save();
        ctx.globalAlpha = g.opacity * g.life;
        ctx.drawImage(ghost, 0, g.yShift);
        ctx.restore();
      });

      for (let i = glitches.length - 1; i >= 0; i--) {
        glitches[i].life -= glitches[i].decay;
        if (glitches[i].life <= 0) glitches.splice(i, 1);
      }
    }
    requestAnimationFrame(draw);

    // ── Password gate ────────────────────────────────────────────────────
    const CORRECT_PASSWORD = 'chaostheory';

    const form    = document.getElementById('passwordForm');
    const input   = document.getElementById('passwordInput');
    const errorEl = document.getElementById('passwordError');

    if (sessionStorage.getItem('pm_auth') === 'true') {
      window.location.replace('shop.html');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value === CORRECT_PASSWORD) {
        sessionStorage.setItem('pm_auth', 'true');
        window.location.replace('shop.html');
      } else {
        errorEl.style.display = 'block';
        input.value = '';
        input.focus();
        input.closest('.password-input-row').style.borderColor = 'rgba(255,80,40,0.7)';
        setTimeout(() => {
          input.closest('.password-input-row').style.borderColor = 'rgba(196,166,96,0.38)';
        }, 1200);
      }
    });

    input.addEventListener('input', () => { errorEl.style.display = 'none'; });
  </script>
  <script src="js/ticker.js"></script>
</body>
</html>
