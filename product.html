<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Open Graph / link preview -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Polymarket">
  <meta property="og:title"       content="Polymarket">
  <meta property="og:description" content="Polymarket Merch — Complimentary.">
  <meta property="og:image"       content="https://polymerch.vercel.app/assets/images/password-bg.jpg">
  <meta property="og:image:width"  content="1440">
  <meta property="og:image:height" content="1080">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Polymarket">
  <meta name="twitter:description" content="Polymarket Merch — Complimentary.">
  <meta name="twitter:image"      content="https://polymerch.vercel.app/assets/images/password-bg.jpg">
  <title>Polymarket — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Product layout ── */
    .pdp-wrap {
      display: grid;
      grid-template-columns: 40fr 60fr;
      align-items: start;
    }

    /* LEFT — sticky info panel */
    .pdp-info {
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 48px 52px 48px 44px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: none;
      background: rgba(255,255,255,0.92);
    }
    .pdp-info::-webkit-scrollbar { display: none; }

    /* RIGHT — hero + vertical thumbnail column */
    .pdp-gallery {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
    }

    /* Hero fills remaining width */
    .pdp-gallery-hero {
      flex: 1;
      min-width: 0;
    }

    .pdp-gallery-hero img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      mix-blend-mode: multiply;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }

    .pdp-gallery-hero img:hover { opacity: 0.88; }

    /* Vertical thumb column — right side */
    .pdp-gallery-thumbs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 76px;
      flex-shrink: 0;
    }

    .pdp-thumb {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      mix-blend-mode: multiply;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.5;
    }

    .pdp-thumb:hover { opacity: 0.8; }
    .pdp-thumb.active { border-color: #000080; opacity: 1; }

    /* Mobile — thumbs drop to a horizontal row below the hero */
    @media (max-width: 860px) {
      .pdp-gallery { flex-direction: column; gap: 6px; }
      .pdp-gallery-thumbs {
        flex-direction: row;
        width: 100%;
        overflow-x: auto;
        gap: 6px;
      }
      .pdp-thumb { width: 64px; flex-shrink: 0; }
    }

    /* Size error badge */
    .size-err {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .size-err.hidden { display: none; }

    /* ── Info panel — block format ── */
    .pdp-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.2;
      color: #000080;
    }
    .pdp-material {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 24px;
    }
    .pdp-price {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      margin-bottom: 30px;
      color: #000080;
    }
    .pdp-size-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #000080;
      margin-bottom: 10px;
    }
    .pdp-size-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .size-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #d8d8d8;
      padding: 8px 13px;
      cursor: pointer;
      background: white;
      color: var(--black);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .size-btn:hover { border-color: var(--black); }
    .size-btn.selected { background: var(--black); color: white; border-color: var(--black); }
    .pdp-sg-link {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      margin-bottom: 36px;
      color: #000080;
    }
    .pdp-sg-link:hover { opacity: 0.7; }
    /* ── Architectural scale inventory bar ── */
    .inv-wrap {
      margin-top: 18px;
      margin-bottom: 0;
    }
    .inv-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #000080;
      margin-bottom: 10px;
    }
    .inv-svg {
      width: 100%;
      height: 24px;
      display: block;
      overflow: visible;
    }
    .inv-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #000080;
      text-align: center;
      margin-top: 6px;
      opacity: 0.75;
    }

    .pdp-add-btn {
      width: 100%;
      background: white;
      color: #000080;
      border: 1px solid #000080;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 15px 0;
      cursor: pointer;
      margin-bottom: 40px;
      transition: background 0.15s, color 0.15s;
    }
    .pdp-add-btn:hover { background: #000080; color: white; }
    .pdp-add-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: white;
      color: #000080;
    }

    /* Request block */
    .pdp-subscribe {
      margin-top: 44px;
      background: #f4f4f4;
      color: #000080;
      border: 1px solid #e0e0e0;
      padding: 18px 20px;
    }
    .pdp-subscribe .sub-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
      color: #000080;
    }
    .pdp-sub-row {
      display: flex;
      border: 1px solid #c0c0d4;
    }
    .pdp-sub-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: #000080;
      letter-spacing: 0.04em;
    }
    .pdp-sub-row input::placeholder { color: rgba(0,0,200,0.35); }
    .pdp-sub-btn {
      color: #000080;
      padding: 0 14px;
      font-size: 16px;
      border-left: 1px solid #c0c0d4;
      background: transparent;
      transition: background 0.15s;
    }
    .pdp-sub-btn:hover { background: rgba(0,0,255,0.06); }
    .pdp-sub-fine {
      font-size: 9px;
      color: rgba(0,0,180,0.5);
      margin-top: 9px;
      line-height: 1.5;
    }
    .pdp-sub-fine a { color: rgba(0,0,200,0.6); text-decoration: underline; }

    /* ── Color picker ── */
    .pdp-color-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #000080;
      margin-bottom: 10px;
    }
    .pdp-color-selected-name {
      color: #000080;
      font-weight: 700;
    }
    .pdp-color-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    /* Color buttons share .size-btn styles; selected state uses blue outline */
    .color-btn.selected {
      background: white;
      color: #000080;
      border-color: #000080;
    }
    .color-err {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .color-err.hidden { display: none; }

    /* Inline apparel size chart */
    .pdp-size-chart {
      width: 100%;
      margin-top: 24px;
      margin-bottom: 0;
    }
    .pdp-size-chart-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e8e8;
    }
    .pdp-size-chart table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.03em;
    }
    .pdp-size-chart th {
      text-align: left;
      padding: 5px 6px 5px 0;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
    }
    .pdp-size-chart td {
      padding: 5px 6px 5px 0;
      border-bottom: 1px solid #f2f2f2;
      color: #333;
      white-space: nowrap;
    }
    .pdp-size-chart tr.chart-active td { color: #000080; }

    /* Size guide table below images */
    .size-guide-wrap {
      padding: 40px 0 0;
      display: none;
    }
    .size-guide-wrap h3 {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
    }
    .size-guide-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.03em;
    }
    .size-guide-wrap th {
      text-align: left;
      padding: 7px 0;
      font-weight: 700;
      border-bottom: 1px solid #e0e0e0;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .size-guide-wrap td {
      padding: 6px 0;
      border-bottom: 1px solid #f2f2f2;
      color: #333;
    }

    /* ── Zoom lightbox ── */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      cursor: zoom-out;
    }
    .zoom-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .zoom-img {
      max-width: 86vw;
      max-height: 86vh;
      object-fit: contain;
      transform: scale(0.94);
      transition: transform 0.22s ease;
      cursor: default;
      pointer-events: none;
    }
    .zoom-overlay.open .zoom-img {
      transform: scale(1);
    }
    .zoom-close {
      position: absolute;
      top: 22px;
      right: 26px;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      transition: color 0.15s;
      z-index: 1;
      padding: 6px;
    }
    .zoom-close:hover { color: #fff; }
    .zoom-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      padding: 16px 20px;
      transition: color 0.15s;
      z-index: 1;
    }
    .zoom-nav:hover { color: #fff; }
    .zoom-nav.zoom-prev { left: 0; }
    .zoom-nav.zoom-next { right: 0; }
    .zoom-nav[hidden] { display: none; }
    .zoom-counter {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.4);
    }

    /* Related row */
    .pdp-related { border-top: 1px solid #e8e8e8; }

    /* Mobile */
    @media (max-width: 860px) {
      .pdp-wrap {
        grid-template-columns: 1fr;
      }
      .pdp-info {
        position: relative;
        top: auto;
        height: auto;
        padding: 28px 20px 36px;
        order: 2; /* info below gallery on mobile */
      }
      .pdp-gallery {
        order: 1;
      }
      .pdp-size-chart table { font-size: 8px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <div class="nav-left">
        <a href="shop.html" class="nav-shop-link">SHOP</a>
      </div>

      <a href="index.html" class="nav-wordmark">POLYMARKET</a>

      <div class="nav-right">

  <!-- POLYMARKET TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>


  <!-- PRODUCT DETAIL -->
  <main id="productMain">

    <div class="pdp-wrap">

      <!-- LEFT: sticky product info -->
      <div class="pdp-info">

        <div class="color-err hidden" id="colorError">SELECT A COLOR*</div>
        <div class="size-err hidden" id="sizeError">SELECT A SIZE*</div>

        <div id="pdpInfo">
          <!-- Populated by JS -->
        </div>

        <!-- Request more items -->

      </div>

      <!-- RIGHT: scrollable image gallery -->
      <div class="pdp-gallery" id="pdpGallery">
        <!-- Images injected by JS -->
      </div>

    </div>

    <!-- Size guide (rendered below image stack, toggled from info panel) -->
    <div class="size-guide-wrap" id="sizeGuideWrap" style="padding: 40px 48px; max-width:640px;">
      <h3>Size Guide</h3>
      <table id="sizeGuideTable"></table>
    </div>

    <!-- Related products -->
    <div class="pdp-related">
      <div class="shop-heading"><a href="shop.html">SHOP COLLECTION <span class="arrow">→</span></a></div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

  </main>

  <!-- 404 -->
  <div id="notFound" style="display:none;flex:1;align-items:center;justify-content:center;padding:80px 20px;text-align:center;">
    <div>
      <p style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;">Product not found.</p>
      <a href="shop.html" style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;">← Back to Shop</a>
    </div>
  </div>

  <!-- ZOOM LIGHTBOX -->
  <div class="zoom-overlay" id="zoomOverlay">
    <button class="zoom-nav zoom-prev" id="zoomPrev" onclick="zoomNav(-1)">←</button>
    <img class="zoom-img" id="zoomImg" src="" alt="">
    <button class="zoom-nav zoom-next" id="zoomNext" onclick="zoomNav(1)">→</button>
    <button class="zoom-close" id="zoomClose">✕</button>
    <span class="zoom-counter" id="zoomCounter"></span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <div class="footer-logo">
          <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M375.84 389.422C375.84 403.572 375.84 410.647 371.212 414.154C366.585 417.662 359.773 415.75 346.15 411.927L127.22 350.493C119.012 348.19 114.907 347.038 112.534 343.907C110.161 340.776 110.161 336.513 110.161 327.988V184.012C110.161 175.487 110.161 171.224 112.534 168.093C114.907 164.962 119.012 163.81 127.22 161.507L346.15 100.072C359.773 96.2495 366.585 94.338 371.212 97.8455C375.84 101.353 375.84 108.428 375.84 122.578V389.422ZM164.761 330.463L346.035 381.337V279.595L164.761 330.463ZM139.963 306.862L321.201 256L139.963 205.138V306.862ZM164.759 181.537L346.035 232.406V130.663L164.759 181.537Z" fill="#000080"/>
          </svg>
          Polymarket
        </div>
        <nav class="footer-links">
          <a href="shipping.html">Shipping &amp; Returns</a>
        </nav>
      </div>
      <span class="footer-copy">©2026</span>
      <div></div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>Your Bag</h2>
      <button class="cart-close-btn" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">Your bag is empty.</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-subtotal"><span>SUBTOTAL</span><span id="cartSubtotal">$0</span></div>
      <!-- Order-limit warning -->
      <div class="cart-limit-warning" id="cartLimitWarning" style="display:none;">
        You have reached the maximum order limit. Please remove an item to proceed.
      </div>

      <!-- Physical button row -->
      <div class="cart-btn-row" id="cartBtnRow">
        <button class="phy-btn phy-btn-green" onclick="showCartForm('client')">
          <div class="phy-btn-keycap">
            <span class="phy-btn-label">For Client</span>
          </div>
        </button>
        <button class="phy-btn phy-btn-red" onclick="showCartForm('employee')">
          <div class="phy-btn-keycap">
            <span class="phy-btn-label">For Employee</span>
          </div>
        </button>
      </div>
      <!-- Inline intake form -->
      <div id="cartIntakePanel" style="display:none;"></div>
    </div>
  </aside>

  <script src="js/products.js"></script>
  <script src="js/shopify-storefront.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/cart.js"></script>
  <script>
    if (sessionStorage.getItem('pm_auth') !== 'true') {
      window.location.replace('index.html');
    }

    let _galleryImages = []; // declared here so it's accessible throughout this script
    let product = null;       // populated live from Shopify (or local fallback)
    let ALL_PRODUCTS = [];    // full catalog, for the related row

    const params = new URLSearchParams(window.location.search);

    // Load the live catalog from Shopify, then render the requested product.
    fetchShopifyProducts().then(all => {
      ALL_PRODUCTS = all;
      product = all.find(p => p.id === params.get('id')) || null;
      if (!product) {
        document.getElementById('productMain').style.display = 'none';
        document.getElementById('notFound').style.display = 'flex';
      } else {
        renderProduct();
      }
    }).catch(err => {
      console.error('[Shopify] product load failed:', err);
      document.getElementById('productMain').style.display = 'none';
      document.getElementById('notFound').style.display = 'flex';
    });

    function renderProduct() {
      document.title = `${product.name} — Polymarket`;

      // Build image gallery: large hero + thumbnail tiles below
      const gallery = document.getElementById('pdpGallery');
      const allImages = product.images && product.images.length ? product.images : [];
      _galleryImages = allImages; // store for zoom lightbox

      // Hero image
      const heroDiv = document.createElement('div');
      heroDiv.className = 'pdp-gallery-hero';
      const heroImg = document.createElement('img');
      heroImg.id = 'pdpHeroImg';
      heroImg.src = allImages[0] || '';
      heroImg.alt = product.name + ' — view 1';
      heroImg.loading = 'eager';
      heroImg.addEventListener('click', () => openZoom(0));
      heroDiv.appendChild(heroImg);
      gallery.appendChild(heroDiv);

      // Thumbnail tiles (only shown when there are 2+ images)
      if (allImages.length > 1) {
        const thumbsDiv = document.createElement('div');
        thumbsDiv.className = 'pdp-gallery-thumbs';
        thumbsDiv.id = 'pdpThumbs';
        allImages.forEach((src, i) => {
          const thumb = document.createElement('img');
          thumb.className = 'pdp-thumb' + (i === 0 ? ' active' : '');
          thumb.src = src;
          thumb.alt = product.name + ' — view ' + (i + 1);
          thumb.loading = 'lazy';
          thumb.addEventListener('click', () => {
            document.getElementById('pdpHeroImg').src = src;
            document.querySelectorAll('.pdp-thumb').forEach((t, j) => {
              t.classList.toggle('active', j === i);
            });
          });
          thumbsDiv.appendChild(thumb);
        });
        gallery.appendChild(thumbsDiv);
      }

      // Build info panel
      const isOneSize = product.sizeType === 'one-size';

      // Standard apparel size chart (guessed — update once confirmed)
      const APPAREL_CHART = [
        { size: 'XS',   chest: '33–34"  /  84–86 cm',  length: '26"  /  66 cm' },
        { size: 'S',    chest: '35–36"  /  89–92 cm',  length: '27"  /  69 cm' },
        { size: 'M',    chest: '37–39"  /  94–99 cm',  length: '28"  /  71 cm' },
        { size: 'L',    chest: '40–42"  /  102–107 cm', length: '29"  /  74 cm' },
        { size: 'XL',   chest: '43–45"  /  109–114 cm', length: '30"  /  76 cm' },
        { size: 'XXL',  chest: '46–48"  /  117–122 cm', length: '31"  /  79 cm' },
        { size: 'XXXL', chest: '49–51"  /  124–130 cm', length: '32"  /  81 cm' },
      ];

      // Determine if this product uses standard apparel sizes
      const apparelSizes = ['XS','S','M','L','XL','XXL','XXXL'];
      const isApparel = !isOneSize && product.sizes &&
        product.sizes.some(s => apparelSizes.includes(s));

      let sizeChart = '';
      if (isApparel) {
        const rows = APPAREL_CHART
          .filter(r => product.sizes.includes(r.size))
          .map(r => `<tr id="chart-${r.size}"><td>${r.size}</td><td>${r.chest}</td><td>${r.length}</td></tr>`)
          .join('');
        sizeChart = `
          <div class="pdp-size-chart">
            <p class="pdp-size-chart-title">Size Guide</p>
            <table>
              <thead><tr><th>Size</th><th>Chest</th><th>Body Length</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      // Color section
      let colorSection = '';
      if (product.colorVariants && product.colorVariants.length) {
        const colorBtns = product.colorVariants.map((cv, i) =>
          `<button class="size-btn color-btn" data-color="${cv.name}" data-color-img="${cv.image || ''}" onclick="selectColor(this)">${cv.name}</button>`
        ).join('');
        colorSection = `
          <span class="pdp-color-label">Select Color — <span class="pdp-color-selected-name" id="colorSelectedName"></span></span>
          <div class="pdp-color-buttons">${colorBtns}</div>
        `;
      }

      // Size section (chart moved below CTAs)
      let sizeSection = '';
      if (isOneSize) {
        sizeSection = `<span class="pdp-size-label">One Size</span>`;
      } else {
        const sizeBtns = product.sizes.map(s =>
          `<button class="size-btn" data-size="${s}" onclick="selectSize(this)">${s}</button>`
        ).join('');
        sizeSection = `
          <span class="pdp-size-label">Select Size</span>
          <div class="pdp-size-buttons">${sizeBtns}</div>
        `;
      }

      document.getElementById('pdpInfo').innerHTML = `
        <h1 class="pdp-name">${product.name}</h1>
        <p class="pdp-material">${product.material}</p>
        <p class="pdp-price">Complimentary</p>
        ${colorSection}
        ${sizeSection}
        <div class="inv-wrap" id="invWrap">
          <p class="inv-subtitle">Inventory Tracker</p>
          <svg class="inv-svg" id="invSvg" viewBox="0 0 300 24" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"></svg>
          <p class="inv-label" id="invLabel"></p>
        </div>
        <button class="pdp-add-btn" id="addBtn" onclick="handleAdd()">Add to Bag</button>
        ${sizeChart}
      `;

      // Size guide table
      if (product.sizeGuide) {
        const table = document.getElementById('sizeGuideTable');
        table.innerHTML = `
          <thead><tr>
            <th>US</th><th>EU</th><th>UK</th><th>CM</th>
          </tr></thead>
          <tbody>${product.sizeGuide.map(r =>
            `<tr><td>${r.us}</td><td>${r.eu}</td><td>${r.uk}</td><td>${r.cm}</td></tr>`
          ).join('')}</tbody>`;
      }

      // Related products
      const related = ALL_PRODUCTS.filter(p => p.id !== product.id).slice(0, 5);
      document.getElementById('relatedGrid').innerHTML = related.map(p => {
        const rSrc = p.images && p.images[0] ? p.images[0] : null;
        return `
          <a href="product.html?id=${p.id}" class="related-card">
            ${rSrc
              ? `<img src="${rSrc}" alt="${p.name}">`
              : `<div class="related-card-placeholder">${p.name}</div>`}
            <div class="related-card-overlay">${p.name}</div>
          </a>`;
      }).join('');

      // Initial inventory bar + deep-linked color selection (?color=)
      setTimeout(renderInventoryBar, 0);
      const urlColor = params.get('color');
      if (urlColor) {
        const colorBtn = document.querySelector('.color-btn[data-color="' + urlColor.toUpperCase() + '"]');
        if (colorBtn) selectColor(colorBtn);
      }
    }

    // ── Helpers ──────────────────────────────────────────
    function clearColorErr() { document.getElementById('colorError').classList.add('hidden'); }
    function clearSizeErr()  { document.getElementById('sizeError').classList.add('hidden'); }

    function selectColor(btn) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      clearColorErr();
      // Update inline label
      const nameEl = document.getElementById('colorSelectedName');
      if (nameEl) nameEl.textContent = btn.dataset.color;
      // Swap gallery hero image when this colorway has its own image
      const img = btn.dataset.colorImg;
      if (img) {
        const heroImg = document.getElementById('pdpHeroImg') || document.querySelector('#pdpGallery img');
        if (heroImg) heroImg.src = img;
        // Deactivate all thumbs (color image doesn't correspond to a thumb)
        document.querySelectorAll('.pdp-thumb').forEach(t => t.classList.remove('active'));
      }
      renderInventoryBar();
    }

    function selectSize(btn) {
      document.querySelectorAll('.size-btn:not(.color-btn)').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      // Highlight matching row in size chart
      document.querySelectorAll('.pdp-size-chart tr').forEach(r => r.classList.remove('chart-active'));
      const chartRow = document.getElementById('chart-' + btn.dataset.size);
      if (chartRow) chartRow.classList.add('chart-active');
      clearSizeErr();
      renderInventoryBar();
    }

    function getColor() {
      if (!product.colorVariants || !product.colorVariants.length) return null; // not required
      const btn = document.querySelector('.color-btn.selected');
      return btn ? btn.dataset.color : ''; // '' = required but not chosen
    }

    function getSize() {
      if (product.sizeType === 'one-size') return 'ONE SIZE';
      const btn = document.querySelector('.size-btn:not(.color-btn).selected');
      return btn ? btn.dataset.size : '';
    }

    // Resolve the live Shopify variant ID for the chosen color/size combo.
    function resolveVariantId(color, size) {
      if (product.variants && product.variants.length) {
        const match = product.variants.find(v =>
          (v.size || 'ONE SIZE') === (size || 'ONE SIZE') &&
          (color ? v.color === color : true));
        if (match) return match.id;
      }
      return (product.shopifyVariants && product.shopifyVariants[size]) || null;
    }

    function getCurrentImage() {
      const heroImg = document.getElementById('pdpHeroImg') || document.querySelector('#pdpGallery img');
      if (heroImg) {
        return heroImg.src.startsWith('http')
          ? heroImg.getAttribute('src')
          : heroImg.src;
      }
      return product.images && product.images[0] ? product.images[0] : null;
    }

    function validate() {
      const color = getColor();
      const size  = getSize();
      let ok = true;
      if (color === '') { // null = no color picker; '' = required but blank
        document.getElementById('colorError').classList.remove('hidden');
        ok = false;
      }
      if (!size) {
        document.getElementById('sizeError').classList.remove('hidden');
        ok = false;
      }
      return ok;
    }

    /* ── Inventory tracking — per color + size combination ──── */
    const INV_MAX = 12;

    function stockKey(color, size) {
      const c = (color || 'nocolor').replace(/\s+/g, '-').toLowerCase();
      const s = (size  || 'nosize' ).replace(/\s+/g, '-').toLowerCase();
      return 'pm_stock_' + product.id + '_' + c + '_' + s;
    }

    function getStockFor(key) {
      const s = localStorage.getItem(key);
      if (s !== null) return Math.max(0, parseInt(s, 10));
      // Seed deterministic random per key so each combo starts differently
      let hash = 0;
      for (let i = 0; i < key.length; i++) {
        hash = Math.imul(hash * 31 + key.charCodeAt(i), 1) | 0;
      }
      const initial = 2 + (Math.abs(hash) % (INV_MAX - 1)); // 2–12
      localStorage.setItem(key, initial);
      return initial;
    }

    function setStockFor(key, n) {
      localStorage.setItem(key, Math.max(0, n));
    }

    function renderInventoryBar() {
      const svg   = document.getElementById('invSvg');
      const label = document.getElementById('invLabel');
      const btn   = document.getElementById('addBtn');
      if (!svg) return;

      const color = getColor();
      const size  = getSize();

      const needsColor     = product.colorVariants && product.colorVariants.length > 0;
      const colorReady     = !needsColor || (color !== '' && color !== null);
      const sizeReady      = product.sizeType === 'one-size' || size !== '';
      const selectionMade  = colorReady && sizeReady;

      const remaining = selectionMade ? getStockFor(stockKey(color, size)) : 0;
      const fillPct   = remaining / INV_MAX; // 0..1

      // ── Halftone dot grid ─────────────────────────────────────
      const COLS   = 48, ROWS = 3;
      const STEP_X = 300 / COLS;   // 6.25
      const STEP_Y = 8;
      const R_FULL = 1.6;
      const R_GHOST = 0.85;
      const fillCols = fillPct * COLS;

      let d = '';
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const cx   = col * STEP_X + STEP_X / 2;
          const cy   = row * STEP_Y + STEP_Y / 2;
          const dist = fillCols - col; // >1 filled, 0-1 transition, <0 empty

          let r, fill;
          if (dist >= 1) {
            r = R_FULL;  fill = '#000080';
          } else if (dist > 0) {
            // soft halftone edge — dot shrinks as it approaches the boundary
            r = R_GHOST + dist * (R_FULL - R_GHOST);
            fill = '#000080';
          } else {
            r = R_GHOST; fill = '#d8d8d8';
          }

          d += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="' + r.toFixed(2) + '" fill="' + fill + '"/>';
        }
      }

      svg.innerHTML = d;

      if (label) {
        if (selectionMade) {
          const pct = Math.round(fillPct * 100);
          label.textContent = remaining + ' / ' + INV_MAX + ' units  ·  ' + pct + '% remaining';
        } else {
          label.textContent = '';
        }
      }

      if (btn) {
        if (selectionMade) {
          const outOfStock = remaining <= 0;
          btn.disabled    = outOfStock;
          btn.textContent = outOfStock ? 'Out of Stock' : 'Add to Bag';
        } else {
          btn.disabled = false; btn.textContent = 'Add to Bag';
        }
      }
    }

    function handleAdd() {
      if (!validate()) return;
      const color = getColor();
      const size  = getSize();
      const key   = stockKey(color, size);
      const stock = getStockFor(key);
      if (stock <= 0) return;
      addToCart({
        id: product.id, name: product.name, price: product.price,
        size, color: color || undefined,
        image: product.images && product.images[0] ? product.images[0] : null,
        shopifyVariantId: resolveVariantId(color, size),
      });
      setStockFor(key, stock - 1);
      renderInventoryBar();
    }

function handleSub(e) { e.preventDefault(); alert("Thanks! We'll be in touch."); e.target.reset(); }

    // ── Zoom lightbox ─────────────────────────────────────
    let _zoomSrcs = [];
    let _zoomIdx  = 0;

    function openZoom(index) {
      _zoomSrcs = _galleryImages.length ? _galleryImages : [document.getElementById('pdpHeroImg')?.src].filter(Boolean);
      _zoomIdx  = index;
      _renderZoom();
      document.getElementById('zoomOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function zoomNav(dir) {
      _zoomIdx = (_zoomIdx + dir + _zoomSrcs.length) % _zoomSrcs.length;
      _renderZoom();
    }

    function _renderZoom() {
      document.getElementById('zoomImg').src     = _zoomSrcs[_zoomIdx];
      const multi = _zoomSrcs.length > 1;
      document.getElementById('zoomPrev').hidden = !multi;
      document.getElementById('zoomNext').hidden = !multi;
      document.getElementById('zoomCounter').textContent =
        multi ? `${_zoomIdx + 1} / ${_zoomSrcs.length}` : '';
    }

    document.getElementById('zoomOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeZoom();
    });
    document.getElementById('zoomClose').addEventListener('click', closeZoom);
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('zoomOverlay').classList.contains('open')) return;
      if (e.key === 'Escape')      closeZoom();
      if (e.key === 'ArrowLeft')   zoomNav(-1);
      if (e.key === 'ArrowRight')  zoomNav(1);
    });
  </script>
