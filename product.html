<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Product layout ── */
    .pdp-wrap {
      display: grid;
      grid-template-columns: 40fr 60fr;
      align-items: start;
    }

    /* LEFT — sticky info panel */
    .pdp-info {
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 48px 52px 48px 44px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: none;
      background: rgba(255,255,255,0.92);
    }
    .pdp-info::-webkit-scrollbar { display: none; }

    /* RIGHT — single-column stacked gallery */
    .pdp-gallery {
      display: flex;
      flex-direction: column;
    }

    .pdp-gallery img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      mix-blend-mode: multiply;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }

    .pdp-gallery img:hover { opacity: 0.88; }

    /* Size error badge */
    .size-err {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .size-err.hidden { display: none; }

    /* ── Info panel — block format ── */
    .pdp-name {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.2;
      color: #0000ff;
    }
    .pdp-material {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 24px;
    }
    .pdp-price {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      margin-bottom: 30px;
      color: #0000ff;
    }
    .pdp-size-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }
    .pdp-size-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .size-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #d8d8d8;
      padding: 8px 13px;
      cursor: pointer;
      background: white;
      color: var(--black);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .size-btn:hover { border-color: var(--black); }
    .size-btn.selected { background: var(--black); color: white; border-color: var(--black); }
    .pdp-sg-link {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      margin-bottom: 36px;
      color: var(--black);
      opacity: 0.5;
    }
    .pdp-sg-link:hover { opacity: 1; }
    .pdp-add-btn {
      width: 100%;
      background: #0000ff;
      color: white;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 15px 0;
      cursor: pointer;
      margin-bottom: 8px;
      border: none;
      transition: opacity 0.15s;
    }
    .pdp-add-btn:hover { opacity: 0.82; }
    .pdp-buy-btn {
      width: 100%;
      background: white;
      color: #0000ff;
      border: 1px solid #0000ff;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 15px 0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .pdp-buy-btn:hover { background: #0000ff; color: white; }

    /* Request block */
    .pdp-subscribe {
      margin-top: 44px;
      background: #f4f4f4;
      color: #0000ff;
      border: 1px solid #e0e0e0;
      padding: 18px 20px;
    }
    .pdp-subscribe .sub-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
      color: #0000ff;
    }
    .pdp-sub-row {
      display: flex;
      border: 1px solid #c0c0d4;
    }
    .pdp-sub-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: #0000ff;
      letter-spacing: 0.04em;
    }
    .pdp-sub-row input::placeholder { color: rgba(0,0,200,0.35); }
    .pdp-sub-btn {
      color: #0000ff;
      padding: 0 14px;
      font-size: 16px;
      border-left: 1px solid #c0c0d4;
      background: transparent;
      transition: background 0.15s;
    }
    .pdp-sub-btn:hover { background: rgba(0,0,255,0.06); }
    .pdp-sub-fine {
      font-size: 9px;
      color: rgba(0,0,180,0.5);
      margin-top: 9px;
      line-height: 1.5;
    }
    .pdp-sub-fine a { color: rgba(0,0,200,0.6); text-decoration: underline; }

    /* ── Color picker ── */
    .pdp-color-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }
    .pdp-color-selected-name {
      color: #0000ff;
      font-weight: 700;
    }
    .pdp-color-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    /* Color buttons share .size-btn styles; selected state uses blue outline */
    .color-btn.selected {
      background: white;
      color: #0000ff;
      border-color: #0000ff;
    }
    .color-err {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .color-err.hidden { display: none; }

    /* Inline apparel size chart */
    .pdp-size-chart {
      width: 100%;
      margin-top: 24px;
      margin-bottom: 0;
    }
    .pdp-size-chart-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e8e8;
    }
    .pdp-size-chart table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.03em;
    }
    .pdp-size-chart th {
      text-align: left;
      padding: 5px 6px 5px 0;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
    }
    .pdp-size-chart td {
      padding: 5px 6px 5px 0;
      border-bottom: 1px solid #f2f2f2;
      color: #333;
      white-space: nowrap;
    }
    .pdp-size-chart tr.chart-active td { color: #0000ff; }

    /* Size guide table below images */
    .size-guide-wrap {
      padding: 40px 0 0;
      display: none;
    }
    .size-guide-wrap h3 {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
    }
    .size-guide-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.03em;
    }
    .size-guide-wrap th {
      text-align: left;
      padding: 7px 0;
      font-weight: 700;
      border-bottom: 1px solid #e0e0e0;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .size-guide-wrap td {
      padding: 6px 0;
      border-bottom: 1px solid #f2f2f2;
      color: #333;
    }

    /* ── Zoom lightbox ── */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      cursor: zoom-out;
    }
    .zoom-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .zoom-img {
      max-width: 86vw;
      max-height: 86vh;
      object-fit: contain;
      transform: scale(0.94);
      transition: transform 0.22s ease;
      cursor: default;
      pointer-events: none;
    }
    .zoom-overlay.open .zoom-img {
      transform: scale(1);
    }
    .zoom-close {
      position: absolute;
      top: 22px;
      right: 26px;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      transition: color 0.15s;
      z-index: 1;
      padding: 6px;
    }
    .zoom-close:hover { color: #fff; }
    .zoom-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      padding: 16px 20px;
      transition: color 0.15s;
      z-index: 1;
    }
    .zoom-nav:hover { color: #fff; }
    .zoom-nav.zoom-prev { left: 0; }
    .zoom-nav.zoom-next { right: 0; }
    .zoom-nav[hidden] { display: none; }
    .zoom-counter {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.4);
    }

    /* Related row */
    .pdp-related { border-top: 1px solid #e8e8e8; }

    /* Mobile */
    @media (max-width: 860px) {
      .pdp-wrap {
        grid-template-columns: 1fr;
      }
      .pdp-info {
        position: relative;
        top: auto;
        height: auto;
        padding: 28px 20px 36px;
        order: 2; /* info below gallery on mobile */
      }
      .pdp-gallery {
        order: 1;
      }
      .pdp-size-chart table { font-size: 8px; }
    }
  </style>
</head>
<body>

  <!-- POLYMARKET TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M375.84 389.422C375.84 403.572 375.84 410.647 371.212 414.154C366.585 417.662 359.773 415.75 346.15 411.927L127.22 350.493C119.012 348.19 114.907 347.038 112.534 343.907C110.161 340.776 110.161 336.513 110.161 327.988V184.012C110.161 175.487 110.161 171.224 112.534 168.093C114.907 164.962 119.012 163.81 127.22 161.507L346.15 100.072C359.773 96.2495 366.585 94.338 371.212 97.8455C375.84 101.353 375.84 108.428 375.84 122.578V389.422ZM164.761 330.463L346.035 381.337V279.595L164.761 330.463ZM139.963 306.862L321.201 256L139.963 205.138V306.862ZM164.759 181.537L346.035 232.406V130.663L164.759 181.537Z" fill="black"/>
        </svg>
        Polymarket
      </a>
      <div class="nav-center">
        <a href="shop.html">SHOP</a>
      </div>
      <div class="nav-right">
        <div style="height:16px;width:1px;background:rgba(0,0,0,0.12);margin:0 4px;"></div>
        <button class="nav-icon-btn" title="Account">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3.5"/>
            <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
          </svg>
        </button>
        <button class="nav-icon-btn" title="Search">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8.5" cy="8.5" r="5"/>
            <path d="M15 15l-3-3"/>
          </svg>
        </button>
        <button class="nav-icon-btn" id="cartToggle" title="Cart">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 3h2l2.5 9.5h9L18 6H6"/>
            <circle cx="9" cy="17" r="1"/>
            <circle cx="15" cy="17" r="1"/>
          </svg>
          <span class="cart-badge" id="cartCount" style="display:none">0</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- PRODUCT DETAIL -->
  <main id="productMain">

    <div class="pdp-wrap">

      <!-- LEFT: sticky product info -->
      <div class="pdp-info">

        <div class="color-err hidden" id="colorError">SELECT A COLOR*</div>
        <div class="size-err hidden" id="sizeError">SELECT A SIZE*</div>

        <div id="pdpInfo">
          <!-- Populated by JS -->
        </div>

        <!-- Request more items -->
        <div class="pdp-subscribe">
          <p class="sub-label">Request more items</p>
          <form class="pdp-sub-row" onsubmit="handleSub(event)">
            <input type="email" placeholder="Email*" required />
            <button type="submit" class="pdp-sub-btn">→</button>
          </form>
          <p class="pdp-sub-fine">Don't see your size or color? Leave your email and we'll be in touch.</p>
        </div>

      </div>

      <!-- RIGHT: scrollable image gallery -->
      <div class="pdp-gallery" id="pdpGallery">
        <!-- Images injected by JS -->
      </div>

    </div>

    <!-- Size guide (rendered below image stack, toggled from info panel) -->
    <div class="size-guide-wrap" id="sizeGuideWrap" style="padding: 40px 48px; max-width:640px;">
      <h3>Size Guide</h3>
      <table id="sizeGuideTable"></table>
    </div>

    <!-- Related products -->
    <div class="pdp-related">
      <div class="shop-heading"><a href="shop.html">SHOP COLLECTION <span class="arrow">→</span></a></div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

  </main>

  <!-- 404 -->
  <div id="notFound" style="display:none;flex:1;align-items:center;justify-content:center;padding:80px 20px;text-align:center;">
    <div>
      <p style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;">Product not found.</p>
      <a href="shop.html" style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;">← Back to Shop</a>
    </div>
  </div>

  <!-- ZOOM LIGHTBOX -->
  <div class="zoom-overlay" id="zoomOverlay">
    <button class="zoom-nav zoom-prev" id="zoomPrev" onclick="zoomNav(-1)">←</button>
    <img class="zoom-img" id="zoomImg" src="" alt="">
    <button class="zoom-nav zoom-next" id="zoomNext" onclick="zoomNav(1)">→</button>
    <button class="zoom-close" id="zoomClose">✕</button>
    <span class="zoom-counter" id="zoomCounter"></span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <path d="M375.84 389.422C375.84 403.572 375.84 410.647 371.212 414.154C366.585 417.662 359.773 415.75 346.15 411.927L127.22 350.493C119.012 348.19 114.907 347.038 112.534 343.907C110.161 340.776 110.161 336.513 110.161 327.988V184.012C110.161 175.487 110.161 171.224 112.534 168.093C114.907 164.962 119.012 163.81 127.22 161.507L346.15 100.072C359.773 96.2495 366.585 94.338 371.212 97.8455C375.84 101.353 375.84 108.428 375.84 122.578V389.422ZM164.761 330.463L346.035 381.337V279.595L164.761 330.463ZM139.963 306.862L321.201 256L139.963 205.138V306.862ZM164.759 181.537L346.035 232.406V130.663L164.759 181.537Z" fill="white"/>
        </svg>
        Polymarket
      </div>
      <nav class="footer-links">
        <a href="shipping.html">Shipping &amp; Returns</a>
      </nav>
      <span class="footer-copy">©2026</span>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>Your Bag</h2>
      <button class="cart-close-btn" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">Your bag is empty.</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-subtotal"><span>SUBTOTAL</span><span id="cartSubtotal">$0</span></div>
      <button class="checkout-btn" onclick="proceedToCheckout()">CHECKOUT</button>
    </div>
  </aside>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    if (sessionStorage.getItem('pm_auth') !== 'true') {
      window.location.replace('index.html');
    }

    const params  = new URLSearchParams(window.location.search);
    const product = getProductById(params.get('id'));

    if (!product) {
      document.getElementById('productMain').style.display = 'none';
      document.getElementById('notFound').style.display = 'flex';
    } else {
      document.title = `${product.name} — Polymarket`;

      // Build image gallery from product.images array
      const gallery = document.getElementById('pdpGallery');
      const allImages = product.images && product.images.length ? product.images : [];

      allImages.forEach((src, i) => {
        const el = document.createElement('img');
        el.src = src;
        el.alt = `${product.name} — view ${i + 1}`;
        el.loading = i === 0 ? 'eager' : 'lazy';
        el.addEventListener('click', () => openZoom(i));
        gallery.appendChild(el);
      });

      // Build info panel
      const isOneSize = product.sizeType === 'one-size';

      // Standard apparel size chart (guessed — update once confirmed)
      const APPAREL_CHART = [
        { size: 'XS',   chest: '33–34"  /  84–86 cm',  length: '26"  /  66 cm' },
        { size: 'S',    chest: '35–36"  /  89–92 cm',  length: '27"  /  69 cm' },
        { size: 'M',    chest: '37–39"  /  94–99 cm',  length: '28"  /  71 cm' },
        { size: 'L',    chest: '40–42"  /  102–107 cm', length: '29"  /  74 cm' },
        { size: 'XL',   chest: '43–45"  /  109–114 cm', length: '30"  /  76 cm' },
        { size: 'XXL',  chest: '46–48"  /  117–122 cm', length: '31"  /  79 cm' },
        { size: 'XXXL', chest: '49–51"  /  124–130 cm', length: '32"  /  81 cm' },
      ];

      // Determine if this product uses standard apparel sizes
      const apparelSizes = ['XS','S','M','L','XL','XXL','XXXL'];
      const isApparel = !isOneSize && product.sizes &&
        product.sizes.some(s => apparelSizes.includes(s));

      let sizeChart = '';
      if (isApparel) {
        const rows = APPAREL_CHART
          .filter(r => product.sizes.includes(r.size))
          .map(r => `<tr id="chart-${r.size}"><td>${r.size}</td><td>${r.chest}</td><td>${r.length}</td></tr>`)
          .join('');
        sizeChart = `
          <div class="pdp-size-chart">
            <p class="pdp-size-chart-title">Size Guide</p>
            <table>
              <thead><tr><th>Size</th><th>Chest</th><th>Body Length</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      // Color section
      let colorSection = '';
      if (product.colorVariants && product.colorVariants.length) {
        const colorBtns = product.colorVariants.map((cv, i) =>
          `<button class="size-btn color-btn" data-color="${cv.name}" data-color-img="${cv.image || ''}" onclick="selectColor(this)">${cv.name}</button>`
        ).join('');
        colorSection = `
          <span class="pdp-color-label">Select Color — <span class="pdp-color-selected-name" id="colorSelectedName"></span></span>
          <div class="pdp-color-buttons">${colorBtns}</div>
        `;
      }

      // Size section (chart moved below CTAs)
      let sizeSection = '';
      if (isOneSize) {
        sizeSection = `<span class="pdp-size-label">One Size</span>`;
      } else {
        const sizeBtns = product.sizes.map(s =>
          `<button class="size-btn" data-size="${s}" onclick="selectSize(this)">${s}</button>`
        ).join('');
        sizeSection = `
          <span class="pdp-size-label">Select Size</span>
          <div class="pdp-size-buttons">${sizeBtns}</div>
        `;
      }

      document.getElementById('pdpInfo').innerHTML = `
        <h1 class="pdp-name">${product.name}</h1>
        <p class="pdp-material">${product.material}</p>
        <p class="pdp-price">$${product.price}</p>
        ${colorSection}
        ${sizeSection}
        <button class="pdp-add-btn" onclick="handleAdd()">Add to Bag</button>
        <button class="pdp-buy-btn" onclick="handleBuy()">Buy Now</button>
        ${sizeChart}
      `;

      // Size guide table
      if (product.sizeGuide) {
        const table = document.getElementById('sizeGuideTable');
        table.innerHTML = `
          <thead><tr>
            <th>US</th><th>EU</th><th>UK</th><th>CM</th>
          </tr></thead>
          <tbody>${product.sizeGuide.map(r =>
            `<tr><td>${r.us}</td><td>${r.eu}</td><td>${r.uk}</td><td>${r.cm}</td></tr>`
          ).join('')}</tbody>`;
      }

      // Related products
      const related = PRODUCTS.filter(p => p.id !== product.id).slice(0, 5);
      document.getElementById('relatedGrid').innerHTML = related.map(p => {
        const rSrc = p.images && p.images[0] ? p.images[0] : null;
        return `
          <a href="product.html?id=${p.id}" class="related-card">
            ${rSrc
              ? `<img src="${rSrc}" alt="${p.name}">`
              : `<div class="related-card-placeholder">${p.name}</div>`}
            <div class="related-card-overlay">${p.name} / $${p.price}</div>
          </a>`;
      }).join('');
    }

    // ── Helpers ──────────────────────────────────────────
    function clearColorErr() { document.getElementById('colorError').classList.add('hidden'); }
    function clearSizeErr()  { document.getElementById('sizeError').classList.add('hidden'); }

    function selectColor(btn) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      clearColorErr();
      // Update inline label
      const nameEl = document.getElementById('colorSelectedName');
      if (nameEl) nameEl.textContent = btn.dataset.color;
      // Swap gallery hero image when this colorway has its own image
      const img = btn.dataset.colorImg;
      if (img) {
        const firstImg = document.querySelector('#pdpGallery img');
        if (firstImg) firstImg.src = img;
      }
    }

    function selectSize(btn) {
      document.querySelectorAll('.size-btn:not(.color-btn)').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      // Highlight matching row in size chart
      document.querySelectorAll('.pdp-size-chart tr').forEach(r => r.classList.remove('chart-active'));
      const chartRow = document.getElementById('chart-' + btn.dataset.size);
      if (chartRow) chartRow.classList.add('chart-active');
      clearSizeErr();
    }

    function getColor() {
      if (!product.colorVariants || !product.colorVariants.length) return null; // not required
      const btn = document.querySelector('.color-btn.selected');
      return btn ? btn.dataset.color : ''; // '' = required but not chosen
    }

    function getSize() {
      if (product.sizeType === 'one-size') return 'ONE SIZE';
      const btn = document.querySelector('.size-btn:not(.color-btn).selected');
      return btn ? btn.dataset.size : '';
    }

    function getCurrentImage() {
      const firstImg = document.querySelector('#pdpGallery img');
      if (firstImg) {
        // Strip origin prefix so we store a relative path
        return firstImg.src.startsWith('http')
          ? firstImg.getAttribute('src')
          : firstImg.src;
      }
      return product.images && product.images[0] ? product.images[0] : null;
    }

    function validate() {
      const color = getColor();
      const size  = getSize();
      let ok = true;
      if (color === '') { // null = no color picker; '' = required but blank
        document.getElementById('colorError').classList.remove('hidden');
        ok = false;
      }
      if (!size) {
        document.getElementById('sizeError').classList.remove('hidden');
        ok = false;
      }
      return ok;
    }

    function handleAdd() {
      if (!validate()) return;
      const color = getColor();
      const size  = getSize();
      addToCart({
        id: product.id, name: product.name, price: product.price,
        size, color: color || undefined,
        image: product.images && product.images[0] ? product.images[0] : null,
        shopifyVariantId: product.shopifyVariants[size] || null,
      });
    }

    function handleBuy() {
      if (!validate()) return;
      const color = getColor();
      const size  = getSize();
      addToCart({
        id: product.id, name: product.name, price: product.price,
        size, color: color || undefined,
        image: product.images && product.images[0] ? product.images[0] : null,
        shopifyVariantId: product.shopifyVariants[size] || null,
      });
      proceedToCheckout();
    }

    function handleSub(e) { e.preventDefault(); alert("Thanks! We'll be in touch."); e.target.reset(); }

    // ── Zoom lightbox ─────────────────────────────────────
    let _zoomSrcs = [];
    let _zoomIdx  = 0;

    function openZoom(index) {
      _zoomSrcs = Array.from(document.querySelectorAll('#pdpGallery img')).map(img => img.src);
      _zoomIdx  = index;
      _renderZoom();
      document.getElementById('zoomOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function zoomNav(dir) {
      _zoomIdx = (_zoomIdx + dir + _zoomSrcs.length) % _zoomSrcs.length;
      _renderZoom();
    }

    function _renderZoom() {
      document.getElementById('zoomImg').src     = _zoomSrcs[_zoomIdx];
      const multi = _zoomSrcs.length > 1;
      document.getElementById('zoomPrev').hidden = !multi;
      document.getElementById('zoomNext').hidden = !multi;
      document.getElementById('zoomCounter').textContent =
        multi ? `${_zoomIdx + 1} / ${_zoomSrcs.length}` : '';
    }

    document.getElementById('zoomOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeZoom();
    });
    document.getElementById('zoomClose').addEventListener('click', closeZoom);
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('zoomOverlay').classList.contains('open')) return;
      if (e.key === 'Escape')      closeZoom();
      if (e.key === 'ArrowLeft')   zoomNav(-1);
      if (e.key === 'ArrowRight')  zoomNav(1);
    });
  </script>
  <script src="js/ticker.js"></script>
</body>
</html>
