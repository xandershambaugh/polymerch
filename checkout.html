<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket — VIP Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .checkout-main {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 52px - 52px);
      border-top: 1px solid #1a1a1a;
    }

    /* ── Left: Order Summary ───────────────────────────────────── */
    .checkout-summary {
      border-right: 1px solid #1a1a1a;
      padding: 40px;
      background: #fafafa;
    }

    .checkout-section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a1a1a;
      padding-bottom: 14px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 24px;
    }

    .checkout-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .checkout-item-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f2f2f2;
      mix-blend-mode: multiply;
    }

    .checkout-item-info {
      flex: 1;
    }

    .checkout-item-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .checkout-item-meta {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      line-height: 1.6;
    }

    .checkout-item-price {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-top: 4px;
    }

    .checkout-subtotal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #1a1a1a;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    .checkout-complimentary {
      margin-top: 16px;
      padding: 12px 14px;
      background: #0000ff;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── Right: Form ───────────────────────────────────────────── */
    .checkout-form-col {
      padding: 40px 48px;
    }

    .form-page-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a1a1a;
      padding-bottom: 14px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 36px;
    }

    .form-section {
      margin-bottom: 36px;
    }

    .form-section-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #0000ff;
      margin-bottom: 20px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      margin-bottom: 6px;
    }

    .form-field input,
    .form-field textarea,
    .form-field select {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.20);
      border-radius: 0;
      padding: 11px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus {
      border-color: #0000ff;
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: rgba(0,0,0,0.22);
      letter-spacing: 0.08em;
    }

    .form-field textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 80px 100px;
      gap: 12px;
    }

    .form-divider {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.10);
      margin: 32px 0;
    }

    .submit-order-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 24px;
      background: #0000ff;
      color: #fff;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .submit-order-btn:hover { background: #0000cc; }

    /* ── Confirmation state ────────────────────────────────────── */
    .checkout-confirm {
      display: none;
      padding: 40px 48px;
      max-width: 560px;
    }

    .confirm-icon {
      width: 40px;
      height: 40px;
      border: 2px solid #0000ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      color: #0000ff;
      font-size: 18px;
    }

    .confirm-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .confirm-ref {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: rgba(0,0,0,0.40);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .confirm-block {
      margin-bottom: 24px;
      padding: 20px;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .confirm-block-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #0000ff;
      margin-bottom: 10px;
    }

    .confirm-block p {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      line-height: 1.8;
    }

    .confirm-back-btn {
      margin-top: 8px;
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #0000ff;
      text-decoration: none;
      border-bottom: 1px solid #0000ff;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>

  <!-- POLYMARKET TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <div class="nav-left">
        <a href="shop.html" class="nav-pill-btn">SHOP</a>
      </div>

      <a href="index.html" class="nav-wordmark">POLYMARKET</a>

      <div class="nav-right">
        <div style="height:16px;width:1px;background:rgba(0,0,0,0.12);margin:0 4px;"></div>
        <a href="topograph.html" class="nav-icon-btn nav-help-btn" title="Markets Topography">?</a>
        <button class="nav-icon-btn" title="Account">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3.5"/>
            <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
          </svg>
        </button>
        <button class="nav-icon-btn" title="Cart" onclick="history.back()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 8V6a3.5 3.5 0 0 1 7 0v2"/>
            <rect x="3" y="8" width="14" height="9" rx="1.5"/>
          </svg></button>
      </div>
    </nav>
  </header>

  <!-- SHOP HEADING BAR -->
  <div class="shop-heading">
    <a href="shop.html">VIP COMPLIMENTARY ORDER <span class="arrow">→</span></a>
  </div>

  <!-- CHECKOUT GRID -->
  <main class="checkout-main" id="checkoutMain">

    <!-- ORDER SUMMARY -->
    <div class="checkout-summary">
      <div class="checkout-section-label">Order Summary</div>
      <div id="checkoutItems">
        <p style="font-family:'Space Mono',monospace;font-size:10px;color:rgba(0,0,0,0.4);letter-spacing:0.10em;">Your bag is empty.</p>
      </div>
      <div class="checkout-subtotal-row">
        <span>Subtotal</span>
        <span id="checkoutTotal">$0</span>
      </div>
      <div class="checkout-complimentary">COMPLIMENTARY — $0.00 CHARGED</div>
    </div>

    <!-- FORM -->
    <div class="checkout-form-col" id="checkoutFormCol">
      <div class="form-page-title">Employee &amp; VIP Details</div>

      <form id="vipOrderForm" novalidate>

        <!-- Employee -->
        <div class="form-section">
          <div class="form-section-title">Employee Information</div>

          <div class="form-field">
            <label for="employeeName">Employee Name *</label>
            <input type="text" id="employeeName" name="employeeName" placeholder="Full name" required>
          </div>

          <div class="form-field">
            <label for="employeeDept">Department *</label>
            <input type="text" id="employeeDept" name="employeeDept" placeholder="e.g. Marketing, Partnerships" required>
          </div>
        </div>

        <hr class="form-divider">

        <!-- VIP Client -->
        <div class="form-section">
          <div class="form-section-title">VIP Client</div>

          <div class="form-field">
            <label for="clientName">Client Name *</label>
            <input type="text" id="clientName" name="clientName" placeholder="e.g. Logan Paul" required>
          </div>

          <div class="form-field">
            <label for="clientEmail">Client Email *</label>
            <input type="email" id="clientEmail" name="clientEmail" placeholder="client@email.com" required>
          </div>

          <div class="form-field">
            <label for="address1">Street Address *</label>
            <input type="text" id="address1" name="address1" placeholder="123 Main St, Apt 4B" required>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="city">City *</label>
              <input type="text" id="city" name="city" required>
            </div>
            <div class="form-field">
              <label for="state">State *</label>
              <input type="text" id="state" name="state" maxlength="2" placeholder="CA" required>
            </div>
            <div class="form-field">
              <label for="zip">ZIP *</label>
              <input type="text" id="zip" name="zip" maxlength="10" placeholder="90210" required>
            </div>
          </div>

        </div>

        <button type="submit" class="submit-order-btn">Submit Order →</button>

      </form>
    </div>

    <!-- CONFIRMATION (hidden until submit) -->
    <div class="checkout-confirm" id="checkoutConfirm">
      <div class="confirm-icon">✓</div>
      <div class="confirm-title">Order Submitted</div>
      <div class="confirm-ref" id="confirmRef">REF —</div>

      <div class="confirm-block">
        <div class="confirm-block-label">Employee</div>
        <p id="confirmEmployee"></p>
      </div>

      <div class="confirm-block">
        <div class="confirm-block-label">VIP Client</div>
        <p id="confirmClient"></p>
      </div>

      <div class="confirm-block">
        <div class="confirm-block-label">Items</div>
        <p id="confirmItems"></p>
      </div>

      <a href="shop.html" class="confirm-back-btn">← Back to Shop</a>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <div class="footer-logo">
          <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M375.84 389.422C375.84 403.572 375.84 410.647 371.212 414.154C366.585 417.662 359.773 415.75 346.15 411.927L127.22 350.493C119.012 348.19 114.907 347.038 112.534 343.907C110.161 340.776 110.161 336.513 110.161 327.988V184.012C110.161 175.487 110.161 171.224 112.534 168.093C114.907 164.962 119.012 163.81 127.22 161.507L346.15 100.072C359.773 96.2495 366.585 94.338 371.212 97.8455C375.84 101.353 375.84 108.428 375.84 122.578V389.422ZM164.761 330.463L346.035 381.337V279.595L164.761 330.463ZM139.963 306.862L321.201 256L139.963 205.138V306.862ZM164.759 181.537L346.035 232.406V130.663L164.759 181.537Z" fill="#000080"/>
          </svg>
          Polymarket
        </div>
        <nav class="footer-links">
          <a href="shipping.html">Shipping &amp; Returns</a>
        </nav>
      </div>
      <span class="footer-copy">©2026</span>
      <div></div>
    </div>
  </footer>

  <script>
    if (sessionStorage.getItem('pm_auth') !== 'true') {
      window.location.replace('index.html');
    }

    // ── Render order summary from cart ───────────────────────────────────
    const CART_KEY = 'pm_cart';

    function getCart() {
      try { return JSON.parse(sessionStorage.getItem(CART_KEY)) || []; }
      catch { return []; }
    }

    function renderSummary() {
      const cart = getCart();
      const itemsEl  = document.getElementById('checkoutItems');
      const totalEl  = document.getElementById('checkoutTotal');
      itemsEl.innerHTML = '';

      if (cart.length === 0) {
        itemsEl.innerHTML = '<p style="font-family:\'Space Mono\',monospace;font-size:10px;color:rgba(0,0,0,0.4);letter-spacing:0.10em;">Your bag is empty.</p>';
        totalEl.textContent = 'Complimentary';
        return;
      }

      let total = 0;
      cart.forEach(item => {
        const price = parseFloat(String(item.price).replace(/[^0-9.]/g, ''));
        const lineTotal = price * (item.qty || 1);
        total += lineTotal;

        const div = document.createElement('div');
        div.className = 'checkout-item';
        div.innerHTML = `
          ${item.image
            ? `<img class="checkout-item-img" src="${item.image}" alt="${item.name}">`
            : `<div class="checkout-item-img"></div>`}
          <div class="checkout-item-info">
            <div class="checkout-item-name">${item.name}</div>
            ${item.color ? `<div class="checkout-item-meta">Color: ${item.color}</div>` : ''}
            <div class="checkout-item-meta">Size: ${item.size}${item.qty > 1 ? ` × ${item.qty}` : ''}</div>
            <div class="checkout-item-price">Complimentary</div>
          </div>
        `;
        itemsEl.appendChild(div);
      });

      totalEl.textContent = 'Complimentary';
    }

    renderSummary();

    // ── Form submission ──────────────────────────────────────────────────
    document.getElementById('vipOrderForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const f = this;
      const data = {
        employeeName: f.employeeName.value.trim(),
        employeeDept: f.employeeDept.value.trim(),
        clientName:   f.clientName.value.trim(),
        clientEmail:  f.clientEmail.value.trim(),
        address1:     f.address1.value.trim(),
        city:         f.city.value.trim(),
        state:        f.state.value.trim().toUpperCase(),
        zip:          f.zip.value.trim(),
      };

      // Basic validation
      for (const [key, val] of Object.entries(data)) {
        if (!val) {
          const input = f[key];
          if (input) { input.focus(); input.style.borderColor = '#ff4444'; setTimeout(()=>{ input.style.borderColor=''; }, 1500); }
          return;
        }
      }

      const cart = getCart();
      const ref  = 'VIP-' + Date.now().toString(36).toUpperCase();

      // Populate confirmation
      document.getElementById('confirmRef').textContent = 'REF ' + ref;
      document.getElementById('confirmEmployee').innerHTML =
        `${data.employeeName}<br>${data.employeeDept}`;
      document.getElementById('confirmClient').innerHTML =
        `${data.clientName}<br>${data.clientEmail}<br>${data.address1}<br>${data.city}, ${data.state} ${data.zip}`;
      document.getElementById('confirmItems').innerHTML =
        cart.map(i => `${i.name}${i.color ? ' / ' + i.color : ''} — ${i.size}${i.qty > 1 ? ' ×' + i.qty : ''}`).join('<br>');

      // Swap form for confirmation
      document.getElementById('checkoutFormCol').style.display = 'none';
      document.getElementById('checkoutConfirm').style.display = 'block';

      // Fire Shopify draft order (non-blocking — confirmation already shown)
      createShopifyDraftOrder({ type: sessionStorage.getItem('pm_intake')
        ? JSON.parse(sessionStorage.getItem('pm_intake')).type : 'unknown', ...data }, cart)
        .then(orderName => {
          if (orderName) {
            const refEl = document.getElementById('confirmRef');
            if (refEl) refEl.textContent += ' · ' + orderName;
          }
        });

      // Clear cart
      sessionStorage.removeItem(CART_KEY);
    });
  </script>
  <script src="js/shopify.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ticker.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
