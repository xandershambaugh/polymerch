</head>
<body class="page-shop">

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <div class="nav-left">
        <a href="shop.html" class="nav-shop-link">SHOP</a>
      </div>

      <a href="index.html" class="nav-wordmark">POLYMARKET</a>

      <div class="nav-right">
        <button class="nav-icon-btn" title="Account">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3.5"/>
            <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
          </svg>
        </button>
        <button class="nav-icon-btn" id="cartToggle" title="Cart"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 8V6a3.5 3.5 0 0 1 7 0v2"/>
            <rect x="3" y="8" width="14" height="9" rx="1.5"/>

      </div>
    </nav>
  </header>

  <!-- POLYMARKET TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>


  <!-- MAIN SHOP -->
  <main class="shop-main" style="flex:1;">
    <div class="shop-heading">
      <a href="shop.html">SHOP COLLECTION <span class="arrow">→</span></a>
    </div>

    <div class="product-grid" id="productGrid">
        <!-- Cards injected live from Shopify by renderShop() below -->
      </div><!-- /.product-grid -->

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <div class="footer-logo">
          <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M375.84 389.422C375.84 403.572 375.84 410.647 371.212 414.154C366.585 417.662 359.773 415.75 346.15 411.927L127.22 350.493C119.012 348.19 114.907 347.038 112.534 343.907C110.161 340.776 110.161 336.513 110.161 327.988V184.012C110.161 175.487 110.161 171.224 112.534 168.093C114.907 164.962 119.012 163.81 127.22 161.507L346.15 100.072C359.773 96.2495 366.585 94.338 371.212 97.8455C375.84 101.353 375.84 108.428 375.84 122.578V389.422ZM164.761 330.463L346.035 381.337V279.595L164.761 330.463ZM139.963 306.862L321.201 256L139.963 205.138V306.862ZM164.759 181.537L346.035 232.406V130.663L164.759 181.537Z" fill="#000080"/>
          </svg>
          Polymarket
        </div>
        <nav class="footer-links">
          <a href="shipping.html">Shipping &amp; Returns</a>
        </nav>
      </div>
      <span class="footer-copy">©2026</span>
      <div></div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>Your Bag</h2>
      <button class="cart-close-btn" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">Your bag is empty.</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-subtotal">
        <span>SUBTOTAL</span>
        <span id="cartSubtotal">$0</span>
      </div>
      <!-- Order-limit warning -->
      <div class="cart-limit-warning" id="cartLimitWarning" style="display:none;">
        You have reached the maximum order limit. Please remove an item to proceed.
      </div>

      <!-- Physical button row -->
      <div class="cart-btn-row" id="cartBtnRow">
        <button class="phy-btn phy-btn-green" onclick="showCartForm('client')">
          <div class="phy-btn-keycap">
            <span class="phy-btn-label">For Client</span>
          </div>
        </button>
        <button class="phy-btn phy-btn-red" onclick="showCartForm('employee')">
          <div class="phy-btn-keycap">
            <span class="phy-btn-label">For Employee</span>
          </div>
        </button>
      </div>
      <!-- Inline intake form -->
      <div id="cartIntakePanel" style="display:none;"></div>
    </div>
  </aside>

  <!-- Floating ? button -->
  <a href="topograph.html" class="floating-help-btn" title="Markets Topography">?</a>

  <script src="js/products.js"></script>
  <script src="js/shopify-storefront.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/cart.js"></script>
  <script>
    if (sessionStorage.getItem('pm_auth') !== 'true') {
      window.location.replace('index.html');
    }
    function handleSubscribe(e) {
      e.preventDefault();
      alert('Thanks for subscribing!');
      e.target.reset();
    }

    // ── Live shop grid: build cards from the Shopify catalog ───────────────
    function shopSizeRange(p) {
      if (p.sizeType === 'shoe')    return ` / SIZES ${p.sizes[0]}–${p.sizes[p.sizes.length - 1]}`;
      if (p.sizeType === 'apparel') return ` / ${p.sizes[0]}–${p.sizes[p.sizes.length - 1]}`;
      return ''; // one-size
    }

    function shopCard({ href, img, name, p, color }) {
      const desc  = (p.material || '').replace(/\s*—\s*/g, ' / ');
      const label = `${name}${color ? ' — ' + color : ''}${desc ? ' / ' + desc : ''}${shopSizeRange(p)}`;
      const cls   = 'product-card' + (p.cardClass ? ' ' + p.cardClass : '');
      return `
        <a href="${href}" class="${cls}">
          <img class="product-card-img" src="${img}" alt="${name}${color ? ' — ' + color : ''}" loading="lazy">
          <div class="product-card-overlay">${label}<br><span class="product-price">Complimentary</span></div>
        </a>`;
    }

    function renderShop(products) {
      const grid = document.getElementById('productGrid');
      const cards = [];
      products.forEach(p => {
        const expandByColor = p.colorVariants && p.colorVariants.length &&
          p.colorVariants.every(cv => cv.image);
        if (expandByColor) {
          // One tile per colorway (e.g. the hoodie), each deep-linking ?color=
          p.colorVariants.forEach(cv => {
            cards.push(shopCard({
              href:  `product.html?id=${p.id}&color=${encodeURIComponent(cv.name)}`,
              img:   cv.image,
              name:  p.name,
              color: cv.name,
              p,
            }));
          });
        } else {
          cards.push(shopCard({
            href: `product.html?id=${p.id}`,
            img:  (p.images && p.images[0]) || '',
            name: p.name,
            p,
          }));
        }
      });
      grid.innerHTML = cards.join('');
    }

    fetchShopifyProducts().then(renderShop);
  </script>
  <script src="js/ticker.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
