<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket — Order Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #fff;
      background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .site-header {
      position: relative;
      z-index: 10;
    }

    /* Centered card — same layer as password gate */
    .intake-gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .intake-card {
      pointer-events: all;
      width: 460px;
      padding: 0 0 36px;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* ── Tab toggle row ────────────────────────────────────────── */
    .tab-row {
      display: flex;
      gap: 14px;
      padding: 28px 44px 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }

    .tab-btn {
      flex: 1;
      padding: 15px 0;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s, box-shadow 0.12s;
    }

    /* Green — For Client */
    #tabClient {
      background: linear-gradient(to bottom, #65b865 0%, #3e913e 55%, #2f752f 100%);
    }

    /* Red — For Employee */
    #tabEmployee {
      background: linear-gradient(to bottom, #c34848 0%, #982222 55%, #7d1717 100%);
    }

    /* Inactive: dimmed, pressed in */
    .tab-btn:not(.active) {
      opacity: 0.55;
      transform: translateY(1px);
      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.55),
        inset 0 2px 6px rgba(0, 0, 0, 0.45);
    }

    /* Active: raised and lit */
    #tabClient.active {
      opacity: 1;
      transform: translateY(0);
      box-shadow:
        0 5px 0 #1c521c,
        0 8px 18px rgba(40, 130, 40, 0.50),
        inset 0 1px 2px rgba(255, 255, 255, 0.35),
        inset 0 -2px 4px rgba(0, 0, 0, 0.20);
    }

    #tabEmployee.active {
      opacity: 1;
      transform: translateY(0);
      box-shadow:
        0 5px 0 #520e0e,
        0 8px 18px rgba(150, 25, 25, 0.50),
        inset 0 1px 2px rgba(255, 255, 255, 0.20),
        inset 0 -2px 4px rgba(0, 0, 0, 0.28);
    }

    /* ── Form panels ───────────────────────────────────────────── */
    .intake-panel {
      padding: 32px 44px 0;
    }

    .intake-field {
      margin-bottom: 20px;
    }

    .intake-field label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.40);
      margin-bottom: 7px;
    }

    .intake-field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      padding: 7px 0;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .intake-field input:focus {
      border-bottom-color: rgba(255, 255, 255, 0.70);
    }

    .intake-field input::placeholder {
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.10em;
    }

    /* ── Submit button ─────────────────────────────────────────── */
    .intake-submit {
      display: block;
      width: calc(100% - 88px);
      margin: 28px 44px 0;
      padding: 12px 0;
      background: #0000ff;
      border: none;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .intake-submit:hover { background: #0000cc; }

    /* ── Error message ─────────────────────────────────────────── */
    .intake-error {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ff4444;
      margin: 12px 44px 0;
    }
  </style>
</head>
<body>

  <!-- TICKER -->
  <div class="site-ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <div class="nav-left">
        <a href="shop.html" class="nav-pill-btn">SHOP</a>
      </div>

      <a href="index.html" class="nav-wordmark">POLYMARKET</a>

      <div class="nav-right">
        <div style="height:16px;width:1px;background:rgba(0,0,0,0.12);margin:0 4px;"></div>
        <a href="topograph.html" class="nav-icon-btn nav-help-btn" title="Markets Topography">?</a>
        <button class="nav-icon-btn" title="Account">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3.5"/>
            <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <!-- INTAKE GATE -->
  <main class="intake-gate">
    <div class="intake-card">

      <!-- Tab toggles -->
      <div class="tab-row">
        <button class="tab-btn active" id="tabClient" onclick="switchTab('client')">For Client</button>
        <button class="tab-btn" id="tabEmployee" onclick="switchTab('employee')">For Employee</button>
      </div>

      <!-- ── FOR CLIENT panel ──────────────────────────────────── -->
      <div class="intake-panel" id="panelClient">
        <form id="formClient" onsubmit="submitIntake(event, 'client')">
          <div class="intake-field">
            <label>Employee Name</label>
            <input type="text" name="employeeName" placeholder="Full name" required>
          </div>
          <div class="intake-field">
            <label>Employee Department</label>
            <input type="text" name="employeeDept" placeholder="e.g. Marketing, Partnerships" required>
          </div>
          <div class="intake-field">
            <label>VIP Client Name</label>
            <input type="text" name="clientName" placeholder="e.g. Logan Paul" required>
          </div>
          <div class="intake-field">
            <label>VIP Client Email Address</label>
            <input type="email" name="clientEmail" placeholder="client@email.com" required>
          </div>
          <div class="intake-field">
            <label>VIP Client Mailing Address</label>
            <input type="text" name="clientAddress" placeholder="Street, City, State, ZIP" required>
          </div>
          <button type="submit" class="intake-submit">Continue to Shop →</button>
          <p class="intake-error" id="errorClient" style="display:none;">Please fill in all fields.</p>
        </form>
      </div>

      <!-- ── FOR EMPLOYEE panel ────────────────────────────────── -->
      <div class="intake-panel" id="panelEmployee" style="display:none;">
        <form id="formEmployee" onsubmit="submitIntake(event, 'employee')">
          <div class="intake-field">
            <label>Employee Name</label>
            <input type="text" name="employeeName" placeholder="Full name" required>
          </div>
          <div class="intake-field">
            <label>Employee Department</label>
            <input type="text" name="employeeDept" placeholder="e.g. Marketing, Partnerships" required>
          </div>
          <div class="intake-field">
            <label>Employee Email Address</label>
            <input type="email" name="employeeEmail" placeholder="you@polymarket.com" required>
          </div>
          <div class="intake-field">
            <label>Employee Mailing Address</label>
            <input type="text" name="employeeAddress" placeholder="Street, City, State, ZIP" required>
          </div>
          <div class="intake-field">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+1 (000) 000-0000" required>
          </div>
          <button type="submit" class="intake-submit">Continue to Shop →</button>
          <p class="intake-error" id="errorEmployee" style="display:none;">Please fill in all fields.</p>
        </form>
      </div>

    </div>
  </main>

  <script>
    if (sessionStorage.getItem('pm_auth') !== 'true') {
      window.location.replace('index.html');
    }

    function switchTab(tab) {
      const isClient = (tab === 'client');
      document.getElementById('tabClient').classList.toggle('active', isClient);
      document.getElementById('tabEmployee').classList.toggle('active', !isClient);
      document.getElementById('panelClient').style.display   = isClient ? 'block' : 'none';
      document.getElementById('panelEmployee').style.display = isClient ? 'none'  : 'block';
    }

    function submitIntake(e, type) {
      e.preventDefault();
      const form = e.target;
      const data = {};
      new FormData(form).forEach((v, k) => { data[k] = v.trim(); });

      // Ensure all fields filled
      if (Object.values(data).some(v => !v)) {
        document.getElementById('error' + (type === 'client' ? 'Client' : 'Employee')).style.display = 'block';
        return;
      }

      // Save to sessionStorage for checkout to use
      sessionStorage.setItem('pm_intake', JSON.stringify({ type, ...data }));
      window.location.href = 'shop.html';
    }
  </script>
  <script src="js/ticker.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
